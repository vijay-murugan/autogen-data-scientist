version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - run_artifacts:/app/run_artifacts
      - ./.env:/app/.env
      - ./.kaggle/kaggle.json:/root/.kaggle/kaggle.json:ro
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - autogen-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - run_artifacts:/app/artifacts
    networks:
      - autogen-network
    restart: unless-stopped

volumes:
  run_artifacts:

networks:
  autogen-network:
    driver: bridge